version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: teleport-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - teleport-net

  redis:
    image: redis:7.0-alpine
    container_name: teleport-redis
    ports:
      - "6379:6379"
    networks:
      - teleport-net

  auth-service:
    build:
      context: ../../
      dockerfile: ./services/auth/Dockerfile
    container_name: teleport-auth-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/remote-support
      - ACCESS_TOKEN_SECRET=access_secret_key_123456
      - REFRESH_TOKEN_SECRET=refresh_secret_key_123456
    depends_on:
      - mongodb
    networks:
      - teleport-net

  api-service:
    build:
      context: ../../
      dockerfile: ./services/api/Dockerfile
    container_name: teleport-api-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://mongodb:27017/remote-support
      - ACCESS_TOKEN_SECRET=access_secret_key_123456
    depends_on:
      - mongodb
    networks:
      - teleport-net

  websocket-service:
    build:
      context: ../../
      dockerfile: ./services/websocket/Dockerfile
    container_name: teleport-websocket-service
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - MONGO_URI=mongodb://mongodb:27017/remote-support
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ACCESS_TOKEN_SECRET=access_secret_key_123456
    depends_on:
      - mongodb
      - redis
    networks:
      - teleport-net

  nginx:
    image: nginx:alpine
    container_name: teleport-proxy
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - api-service
      - websocket-service
    networks:
      - teleport-net

networks:
  teleport-net:
    driver: bridge

volumes:
  mongo-data:
    driver: local
